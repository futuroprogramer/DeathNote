<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Note</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #111;
  font-family: 'Courier New', monospace;
  color: white;
  text-align: center;
}

h1 {
  font-family: 'Creepster', cursive;
  font-size: 60px;
  margin-top: 40px;
}

.caderno {
  background: #f5f5dc;
  color: black;
  width: 400px;
  margin: 30px auto;
  padding: 30px;
  box-shadow: 0 0 30px black;
  position: relative;
}

.caderno::before {
  content: "";
  position: absolute;
  left: 40px;
  width: 2px;
  height: 100%;
  background: red;
}

input {
  width: 80%;
  padding: 10px;
  font-size: 18px;
  border: none;
  border-bottom: 2px solid black;
  background: transparent;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  color: darkred;
}

.lista {
  margin-top: 20px;
  text-align: left;
}

  @font-face {
  font-family: 'DeathNote';
  src: url('DEATHNOTEFont.ttf');
}
}
</style>
</head>

<body>

<h1>DEATH NOTE</h1>

<div class="caderno">
  <p>O humano cujo nome for escrito aqui morrerá...</p>

  <input type="text" id="nome" placeholder="Digite o nome...">
  <br>
  <button onclick="escrever()">Escrever</button>

  <div class="result" id="resultado"></div>
  <div class="lista" id="lista"></div>
</div>

<script>
let nomes = JSON.parse(localStorage.getItem("nomes")) || [];

function atualizarLista() {
  document.getElementById("lista").innerHTML =
    nomes.map(n => "✒️ " + n).join("<br>");
}

function escrever() {
  document.getElementById("resultado").innerHTML =
  "☠️ " + nome + " teve seu destino selado...";

  if (!nome) {
    alert("Digite um nome...");
    return;
  }

  nomes.push(nome);
  localStorage.setItem("nomes", JSON.stringify(nomes));

  document.getElementById("resultado").innerHTML =
    "☠️ " + nome + " teve seu destino selado...";

  atualizarLista();
}

atualizarLista();
</script>

</body>
</html>
