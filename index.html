<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Note</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: 'Courier New', monospace;
  color: white;
  text-align: center;
}

@font-face {
  font-family: 'DeathNote';
  src: url('DEATHNOTEFont.ttf');
}

h1 {
  font-family: 'DeathNote';
  font-size: 70px;
}

.caderno {
  width: 500px;
  margin: 30px auto;
  padding: 40px 30px;
  background: repeating-linear-gradient(
    to bottom,
    #f5f5dc,
    #f5f5dc 28px,
    #ccc 29px
  );
  color: black;
  box-shadow: 0 0 30px black;
  position: relative;
}

.caderno::before {
  content: "";
  position: absolute;
  left: 40px;
  width: 2px;
  height: 100%;
  background: red;
}

input {
  width: 80%;
  padding: 10px;
  font-size: 18px;
  border: none;
  border-bottom: 2px solid black;
  background: transparent;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  color: darkred;
}

.lista {
  margin-top: 20px;
  text-align: left;
  padding-left: 50px;
  line-height: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>DEATH NOTE</h1>

<div class="caderno">
  <p>O humano cujo nome for escrito aqui morrerá...</p>

  <input type="text" id="nome" placeholder="Digite o nome...">
  <br>
  <button onclick="escrever()">Escrever</button>

  <div class="result" id="resultado"></div>
  <div class="lista" id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// SUA CONFIG 🔥
const firebaseConfig = {
  apiKey: "AIzaSyAqaceT9RVD-ZkbF3P_wv7VfTS0VViKtJY",
  authDomain: "death-note-8aaae.firebaseapp.com",
  databaseURL: "https://death-note-8aaae-default-rtdb.firebaseio.com",
  projectId: "death-note-8aaae",
  storageBucket: "death-note-8aaae.firebasestorage.app",
  messagingSenderId: "371205022088",
  appId: "1:371205022088:web:19ce0df7e05ddb518f9a3d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// lista GLOBAL em tempo real 😈
onValue(ref(db, "nomes"), (snapshot) => {
  let data = snapshot.val();
  let lista = [];

  if (data) {
    lista = Object.values(data);
  }

  document.getElementById("lista").innerHTML = lista.join("<br>");
});

// efeito escrita
function escreverTexto(texto) {
  let i = 0;
  let el = document.getElementById("resultado");
  el.innerHTML = "";

  let intervalo = setInterval(() => {
    el.innerHTML += texto[i];
    i++;
    if (i >= texto.length) clearInterval(intervalo);
  }, 40);
}

// contador 40s 💀
function contadorMorte(nome) {
  let tempo = 40;
  let el = document.getElementById("resultado");

  let intervalo = setInterval(() => {
    if (tempo > 0) {
      el.innerHTML = "☠️ " + nome + " morrerá em " + tempo + "s...";
      tempo--;
    } else {
      clearInterval(intervalo);
      escreverTexto("☠️ " + nome + " teve seu destino selado...");
    }
  }, 1000);
}

// função global (botão)
window.escrever = function () {
  let input = document.getElementById("nome");
  let nome = input.value;

  if (!nome) {
    alert("Digite um nome...");
    return;
  }

  // salva no banco 🌐
  push(ref(db, "nomes"), nome);

  contadorMorte(nome);

  input.value = "";
};
</script>

</body>
</html>
