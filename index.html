<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Note</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #111;
  font-family: 'Courier New', monospace;
  color: white;
  text-align: center;
}

@font-face {
  font-family: 'DeathNote';
  src: url('DEATHNOTEFont.ttf');
}

h1 {
  font-family: 'DeathNote';
  font-size: 70px;
}

.caderno {
  width: 500px;
  margin: 30px auto;
  padding: 40px 30px;
  background: repeating-linear-gradient(
    to bottom,
    #f5f5dc,
    #f5f5dc 28px,
    #ccc 29px
  );
  color: black;
  box-shadow: 0 0 30px black;
  position: relative;
}

.caderno::before {
  content: "";
  position: absolute;
  left: 40px;
  width: 2px;
  height: 100%;
  background: red;
}

input {
  width: 80%;
  padding: 10px;
  font-size: 18px;
  border: none;
  border-bottom: 2px solid black;
  background: transparent;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  color: darkred;
}

.lista {
  margin-top: 20px;
  text-align: left;
  padding-left: 50px;
  line-height: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>DEATH NOTE</h1>

<div class="caderno">
  <p>O humano cujo nome for escrito aqui morrerá...</p>

  <input type="text" id="nome" placeholder="Digite o nome...">
  <br>
  <button onclick="escrever()">Escrever</button>

  <div class="result" id="resultado"></div>
  <div class="lista" id="lista"></div>
</div>

<script>
let nomes = JSON.parse(localStorage.getItem("nomes")) || [];

function atualizarLista() {
  document.getElementById("lista").innerHTML =
    nomes.join("<br>");
}

// efeito de escrita
function escreverTexto(texto) {
  let i = 0;
  let el = document.getElementById("resultado");
  el.innerHTML = "";

  let intervalo = setInterval(() => {
    el.innerHTML += texto[i];
    i++;
    if (i >= texto.length) clearInterval(intervalo);
  }, 40);
}

function escrever() {
  let input = document.getElementById("nome");
  let nome = input.value;

  if (!nome) {
    alert("Digite um nome...");
    return;
  }

  // salva nome
  nomes.push(nome);
  localStorage.setItem("nomes", JSON.stringify(nomes));

  // mostra mensagem
  escreverTexto("☠️ " + nome + " teve seu destino selado...");

  // atualiza lista
  atualizarLista();

  // limpa o input
  input.value = "";
}

// carrega ao abrir
atualizarLista();
</script>
