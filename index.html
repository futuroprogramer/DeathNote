<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Death Note</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: 'Courier New', monospace;
  color: white;
  text-align: center;
}

@font-face {
  font-family: 'DeathNote';
  src: url('DEATHNOTEFont.ttf');
}

h1 {
  font-family: 'DeathNote';
  font-size: 70px;
}

.caderno {
  width: 500px;
  margin: 30px auto;
  padding: 40px 30px;
  background: repeating-linear-gradient(
    to bottom,
    #f5f5dc,
    #f5f5dc 28px,
    #ccc 29px
  );
  color: black;
  box-shadow: 0 0 30px black;
  position: relative;
}

.caderno::before {
  content: "";
  position: absolute;
  left: 40px;
  width: 2px;
  height: 100%;
  background: red;
}

input {
  width: 80%;
  padding: 10px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}

.lista, #ranking {
  margin-top: 20px;
  text-align: left;
  padding-left: 50px;
  line-height: 30px;
}
</style>
</head>

<body>

<h1>DEATH NOTE</h1>

<button onclick="login()">Login com Google</button>
<div id="user"></div>

<div class="caderno">
  <p>O humano cujo nome for escrito aqui morrerá...</p>

  <input type="text" id="nome" placeholder="Digite o nome...">
  <br>
  <button onclick="escrever()">Escrever</button>

  <div id="resultado"></div>
  <div id="lista"></div>
</div>

<h2>🏆 Ranking dos Kiras</h2>
<div id="ranking"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqaceT9RVD-ZkbF3P_wv7VfTS0VViKtJY",
  authDomain: "death-note-8aaae.firebaseapp.com",
  databaseURL: "https://death-note-8aaae-default-rtdb.firebaseio.com",
  projectId: "death-note-8aaae"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

// LOGIN
window.login = async function () {
  const result = await signInWithPopup(auth, provider);
  document.getElementById("user").innerText =
    "Logado como: " + result.user.displayName;
};

// LISTA GLOBAL
onValue(ref(db, "nomes"), (snapshot) => {
  let data = snapshot.val();
  let lista = [];

  if (data) {
    lista = Object.values(data).map(n => n.nome);
  }

  document.getElementById("lista").innerHTML = lista.join("<br>");
});

// RANKING VISÍVEL
onValue(ref(db, "ranking"), (snapshot) => {
  let data = snapshot.val();
  if (!data) return;

  let lista = [];

  for (let id in data) {
    lista.push({
      nome: data[id].nome,
      pontos: data[id].pontos
    });
  }

  lista.sort((a, b) => b.pontos - a.pontos);

  document.getElementById("ranking").innerHTML =
    lista.map((u, i) =>
      `#${i+1} 👑 ${u.nome} - ${u.pontos} nomes`
    ).join("<br>");
});

// CONTADOR
function contadorMorte(nome) {
  let tempo = 40;
  let el = document.getElementById("resultado");

  let intervalo = setInterval(() => {
    if (tempo > 0) {
      el.innerHTML = nome + " morrerá em " + tempo + "s...";
      tempo--;
    } else {
      clearInterval(intervalo);
      el.innerHTML = nome + " teve seu destino selado ☠️";
    }
  }, 1000);
}

// ESCREVER + RANKING
window.escrever = async function () {
  let input = document.getElementById("nome");
  let nome = input.value;
  let user = auth.currentUser;

  if (!user) {
    alert("Faça login!");
    return;
  }

  if (!nome) return;

  push(ref(db, "nomes"), {
    nome: nome,
    user: user.displayName
  });

  let refUser = ref(db, "ranking/" + user.uid);
  let snap = await get(refUser);

  let atual = snap.val() || { nome: user.displayName, pontos: 0 };

  set(refUser, {
    nome: user.displayName,
    pontos: atual.pontos + 1
  });

  contadorMorte(nome);
  input.value = "";
};
</script>

</body>
</html>
